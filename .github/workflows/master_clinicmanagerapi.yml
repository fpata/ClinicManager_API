# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - clinicmanagerapi

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build ClinicManager_API.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish ClinicManager_API.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_19647A9CDCB54E2FBB2EB3F92BBCECBC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F3E468C41D1D4FE7BD7881891CA5B5F0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5F683995B1764016A330559FE6B51DCC }}

      - name: Configure Web App to 32-bit
        run: |
          $RG = (az webapp list --query "[?name=='clinicmanagerapi'].resourceGroup" -o tsv)
          if ($RG) {
            az webapp config set --name clinicmanagerapi --resource-group $RG --use-32bit-worker-process true
          }
        shell: pwsh

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'clinicmanagerapi'
          slot-name: 'Production'
          package: .